    <h2 class="Title">メンバー紹介</h2>

    <section class="member-grid" aria-label="メンバー一覧">
      <article class="member-card">
        <span class="part">Vocal / Guitar</span>
        <h2>Haruto</h2>
        <p>ざらついたギターと、少し青い歌詞を担当。小さなライブハウスの距離感を大切にしています。</p>
      </article>
      <article class="member-card">
        <span class="part">Bass</span>
        <h2>Ren</h2>
        <p>曲の土台を支えるベース担当。シンプルなフレーズで、歌とギターを前に出すアレンジを意識しています。</p>
      </article>
      <article class="member-card">
        <span class="part">Drums</span>
        <h2>Mio</h2>
        <p>疾走感のあるビート担当。静かなAメロからサビで一気に広がる展開を支えます。</p>
      </article>
    </section>
